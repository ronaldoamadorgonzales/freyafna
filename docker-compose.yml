version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kintsugi-app
    restart: always
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres_secure_password_123@shared-postgres:5432/kintsugi_db
      - NODE_ENV=production
    networks:
      - netowaku-app-network

networks:
  netowaku-app-network:
    external: true
