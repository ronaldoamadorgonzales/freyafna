version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kintsugi-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kintsugi_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kintsugi-app
    restart: always
    ports:
      - "3005:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/kintsugi_db
      - NODE_ENV=production
    depends_on:
      - db

volumes:
  postgres_data:
